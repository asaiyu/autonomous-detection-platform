name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - docs-reconcile

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pytest
        run: |
          cd backend
          python -m pytest -q

      - name: Run deterministic rule tests
        run: |
          cd backend
          python -m app.detection.test_runner

  migration-check:
    name: Migration Smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: adp
          POSTGRES_USER: adp
          POSTGRES_PASSWORD: adp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U adp -d adp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://adp:adp@localhost:5432/adp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Upgrade migrations to head
        run: |
          cd backend
          alembic upgrade head

      - name: Downgrade and re-upgrade migration path
        run: |
          cd backend
          alembic downgrade 0004_doc_alignment_columns
          alembic upgrade head

  docker-build-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t adp-backend-ci ./backend

      - name: Build frontend image
        run: docker build -t adp-frontend-ci ./frontend
