id: office_powershell_encoded
name: "Office spawning encoded PowerShell"
description: "Detects encoded PowerShell execution often linked to malicious Office payloads."
severity: high
enabled: true
log_sources:
  - windows
tags: [windows, powershell, execution]
version: 1
created_at: "2026-03-04"
author: "manual"
references: []

detect:
  type: single
  where:
    all:
      - field: source.type
        op: equals
        value: windows
      - field: process.name
        op: iequals
        value: powershell.exe
      - field: process.command_line
        op: icontains
        value: "-encodedcommand"

output:
  alert_title: "Encoded PowerShell command detected"
  alert_category: "execution"
  alert_type: "suspicious_command"
  confidence: 0.9
  default_status: "open"

evidence:
  include_fields:
    - event_id
    - timestamp
    - source.type
    - host.hostname
    - user.name
    - process.name
    - process.command_line
